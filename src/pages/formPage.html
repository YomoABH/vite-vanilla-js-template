<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../styles/style.css">
	<title>Заявка</title>
</head>
<body>
	<div class="container">
		<h1 class="form form-header">Анкета гостя</h1>
		<p class="form form-descr">Пожалуйста, подтвердите ваше <br> присутствие  на нашей свадьбе до:</p>
		<p class="form form-date">01 Июля 2026</p>

		<form class="guest-form">

			<!-- TEXT INPUT -->
			<div class="field field--text">
				<label class="field__label" for="guest-name">Ваше имя и фамилия</label>
				<input
					class="field__input"
					type="text"
					id="guest-name"
					name="guest-name"
					placeholder="Введите имя"
				>
			</div>

			<!-- RADIO GROUP -->
			<fieldset class="field field--radio">
				<legend class="field__legend">Планируете ли вы присутствовать ?</legend>

				<label class="radio">
					<input class="radio__input" type="radio" name="attendance" value="yes">
					<span class="radio__box"></span>
					<span class="radio__label">С удовольствием приду!</span>
				</label>

				<label class="radio">
					<input class="radio__input" type="radio" name="attendance" value="no">
					<span class="radio__box"></span>
					<span class="radio__label">К сожалению, не смогу</span>
				</label>
			</fieldset>

			<!-- CHECKBOX GROUP -->
			<fieldset class="field field--checkbox">
				<legend class="field__legend">Ваши предпочтения </legend>

				<label class="checkbox">
					<input class="checkbox__input" type="checkbox" name="pref" value="food">
					<span class="checkbox__box"></span>
					<span class="checkbox__label">Шампанское</span>
				</label>

				<label class="checkbox">
					<input class="checkbox__input" type="checkbox" name="pref" value="food">
					<span class="checkbox__box"></span>
					<span class="checkbox__label">Шампанское</span>
				</label>

				<label class="checkbox">
					<input class="checkbox__input" type="checkbox" name="pref" value="food">
					<span class="checkbox__box"></span>
					<span class="checkbox__label">Шампанское</span>
				</label>
			</fieldset>

			<button class="form-submit" type="submit">Подтвердить</button>

		</form>
	</div>

	<style>
	* {
		padding: 0;
		margin: 0;
		box-sizing: border-box;
	}
	
	html body {
		background: #FFFFFF;

	}
	.form {
		color: #000000;
		text-align: center;
	}

	.form-header {
		font-family: var(--font-moiamova);
		font-size: 70px;
		display: block;
		margin-bottom: 30px;
		margin-top: 80px;
	}

	.form-descr {
		margin-bottom: 15px;
	}

	.form-date {
		font-size: 25px;
	}

	/* ── FORM LAYOUT ── */
	.guest-form {
		display: flex;
		flex-direction: column;
		gap: 32px;
		max-width: 400px;
		margin: 40px auto 0;
	}

	/* ── FIELD WRAPPERS ── */
	.field {
		display: flex;
		flex-direction: column;
		gap: 12px;
		border: none;
		padding-top: 20px;
	}

	.field__label,
	.field__legend {
		font-family: 'Moiamova';
		font-size: 25px;
		color: #000;
	}

	/* ── TEXT INPUT ── */
	.field__input {
		width: 100%;
		padding: 12px 16px;
		border: 1px solid #000;
		border-radius: 24px;
		font-size: 16px;
		outline: none;
		background: transparent;
	}

	/* ── RADIO ── */
	.radio,
	.checkbox {
		display: flex;
		align-items: center;
		gap: 10px;
		cursor: pointer;
		user-select: none;
	}

	.radio__input,
	.checkbox__input {
		display: none;
	}

	.radio__box {
		width: 20px;
		height: 20px;
		border-radius: 50%;
		border: 1px solid #000;
		flex-shrink: 0;
		display: flex;
		align-items: center;
		justify-content: center;
	}

	.radio__input:checked + .radio__box::after {
		content: '';
		width: 10px;
		height: 10px;
		border-radius: 50%;
		background: #000;
	}

	/* ── CHECKBOX ── */
	.checkbox__box {
		width: 20px;
		height: 20px;
		border: 1px solid #000;
		border-radius: 5px;
		flex-shrink: 0;
		display: flex;
		align-items: center;
		justify-content: center;
	}

	.checkbox__input:checked + .checkbox__box::after {
		content: '✓';
		font-size: 14px;
		line-height: 1;
	}

	/* ── SUBMIT ── */
	.form-submit {
		padding: 10px 30px;
		background: var(--color-accent);
		border-radius: 24px;
		color: #fff;
		border: none;
		font-size: 16px;
		cursor: pointer;
		display: inline-block;
	}
	</style>
</body>


</html>
